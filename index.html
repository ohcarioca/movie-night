<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie Night 🎰</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎰</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bungee+Shade&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    /* ==================== CSS Custom Properties ==================== */
    :root {
      --bg-dark: #0a0015;
      --bg-purple: #1a0030;
      --bg-blue: #0d1b2a;
      --neon-pink: #ff2d75;
      --neon-cyan: #00f0ff;
      --neon-yellow: #ffe14d;
      --gold: #ffd700;
      --gold-dark: #b8860b;
      --white: #f0f0f0;
      --font-display: 'Bungee Shade', cursive;
      --font-body: 'Outfit', sans-serif;
    }

    /* ==================== CSS Reset ==================== */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* ==================== Body ==================== */
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, var(--bg-dark), var(--bg-purple), var(--bg-blue));
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite;
      font-family: var(--font-body);
      color: var(--white);
      overflow-x: hidden;
    }

    @keyframes gradientShift {
      0% {
        background-position: 0% 50%;
      }
      25% {
        background-position: 100% 0%;
      }
      50% {
        background-position: 100% 50%;
      }
      75% {
        background-position: 0% 100%;
      }
      100% {
        background-position: 0% 50%;
      }
    }

    /* ==================== Sections ==================== */
    section {
      display: none;
      min-height: 100dvh;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    section.active {
      display: flex;
      animation: screen-fade-in 0.5s ease-out;
    }
    @keyframes screen-fade-in {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ==================== Neon Text Utilities ==================== */
    .neon-text {
      text-shadow:
        0 0 10px var(--neon-pink),
        0 0 40px var(--neon-pink),
        0 0 80px var(--neon-pink);
    }

    .neon-text-cyan {
      text-shadow:
        0 0 10px var(--neon-cyan),
        0 0 40px var(--neon-cyan),
        0 0 80px var(--neon-cyan);
    }

    /* ==================== Landing Screen ==================== */
    #landing h1 {
      font-family: var(--font-display);
      font-size: clamp(2rem, 8vw, 4.5rem);
      color: var(--neon-pink);
      text-align: center;
      animation: pulse-glow 2s ease-in-out infinite alternate;
    }

    @keyframes pulse-glow {
      from { text-shadow: 0 0 10px var(--neon-pink), 0 0 40px var(--neon-pink); }
      to { text-shadow: 0 0 20px var(--neon-pink), 0 0 60px var(--neon-pink), 0 0 100px var(--neon-pink); }
    }

    #landing p {
      font-family: var(--font-body);
      color: var(--white);
      font-size: 1.1rem;
      opacity: 0.8;
      margin: 1rem 0 2rem;
    }

    .preview-icons {
      display: flex;
      gap: 2.5rem;
      margin-bottom: 2.5rem;
    }

    .preview-icon {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }

    .preview-icon span {
      font-size: 2.5rem;
      filter: drop-shadow(0 0 8px var(--neon-cyan));
    }

    .preview-icon small {
      font-family: var(--font-body);
      font-size: 0.9rem;
      color: var(--neon-cyan);
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: 0.8;
    }

    .neon-btn {
      font-family: var(--font-body);
      font-size: 1.3rem;
      font-weight: 700;
      padding: 1rem 2.5rem;
      border: 2px solid var(--neon-cyan);
      background: transparent;
      color: var(--neon-cyan);
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 2px;
      transition: all 0.3s;
      box-shadow: 0 0 15px rgba(0, 240, 255, 0.3), inset 0 0 15px rgba(0, 240, 255, 0.1);
      border-radius: 8px;
    }
    .neon-btn:hover {
      background: rgba(0, 240, 255, 0.15);
      box-shadow: 0 0 30px rgba(0, 240, 255, 0.5), inset 0 0 30px rgba(0, 240, 255, 0.2);
      transform: scale(1.05);
    }
    .neon-btn:active {
      transform: scale(0.95);
    }
    /* ==================== Dice Game ==================== */
    #dice-game h2 {
      font-family: var(--font-display);
      font-size: clamp(1.2rem, 5vw, 2rem);
      color: var(--neon-cyan);
      margin-bottom: 1.5rem;
    }

    .dice-scene {
      width: 140px;
      height: 140px;
      perspective: 600px;
      margin: 2rem auto;
    }

    .dice-cube {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 2.5s cubic-bezier(0.2, 0.8, 0.3, 1);
    }

    .dice-face {
      position: absolute;
      width: 140px;
      height: 140px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.5rem;
      background: rgba(26, 0, 48, 0.9);
      border: 2px solid var(--neon-cyan);
      border-radius: 16px;
      box-shadow: inset 0 0 30px rgba(0, 240, 255, 0.15), 0 0 15px rgba(0, 240, 255, 0.2);
      backface-visibility: visible;
    }

    .front  { transform: translateZ(70px); }
    .back   { transform: rotateY(180deg) translateZ(70px); }
    .right  { transform: rotateY(90deg) translateZ(70px); }
    .left   { transform: rotateY(-90deg) translateZ(70px); }
    .top    { transform: rotateX(90deg) translateZ(70px); }
    .bottom { transform: rotateX(-90deg) translateZ(70px); }

    #dice-result {
      min-height: 4rem;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .result-reveal {
      font-family: var(--font-body);
      font-size: clamp(1rem, 4vw, 1.5rem);
      font-weight: 700;
      color: var(--neon-yellow);
      animation: reveal-pop 0.5s ease-out;
      max-width: 90vw;
      text-align: center;
      word-wrap: break-word;
    }

    @keyframes reveal-pop {
      0% { transform: scale(0); opacity: 0; }
      70% { transform: scale(1.3); }
      100% { transform: scale(1); opacity: 1; }
    }

    /* ==================== Slot Machine ==================== */
    #slot-game h2 {
      font-family: var(--font-display);
      font-size: clamp(1.2rem, 5vw, 2rem);
      color: var(--neon-pink);
      margin-bottom: 0.5rem;
    }

    .mood-badge {
      background: rgba(255, 225, 77, 0.15);
      border: 1px solid var(--neon-yellow);
      border-radius: 20px;
      padding: 0.3rem 1rem;
      font-family: var(--font-body);
      font-size: 0.9rem;
      color: var(--neon-yellow);
      margin-bottom: 1.5rem;
    }

    .slot-machine {
      margin: 1rem auto;
      max-width: 380px;
      width: 90%;
    }

    .slot-frame {
      background: linear-gradient(145deg, #2a0045, #15002a);
      border: 3px solid var(--gold);
      border-radius: 16px;
      padding: 1.5rem 1rem;
      box-shadow: 0 0 30px rgba(255, 215, 0, 0.3), inset 0 0 30px rgba(0, 0, 0, 0.5);
      position: relative;
    }

    .slot-reels {
      display: flex;
      gap: 8px;
      justify-content: center;
    }

    .reel-window {
      width: 100px;
      height: 90px;
      overflow: hidden;
      background: #0a0015;
      border: 2px solid var(--gold-dark);
      border-radius: 8px;
      position: relative;
    }

    .reel-strip {
      display: flex;
      flex-direction: column;
    }

    .reel-item {
      width: 100px;
      height: 90px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6px;
      text-align: center;
      font-family: var(--font-body);
      font-size: 0.65rem;
      font-weight: 600;
      color: var(--white);
      line-height: 1.2;
      flex-shrink: 0;
    }

    #slot-result {
      min-height: 3.5rem;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 0.5rem;
      max-width: 90vw;
    }

    .spin-counter {
      font-family: var(--font-body);
      font-size: 0.85rem;
      color: var(--neon-yellow);
      margin-bottom: 0.5rem;
      opacity: 0.8;
    }

    .jackpot-text {
      font-family: var(--font-display);
      font-size: clamp(1.5rem, 6vw, 2.5rem);
      color: var(--gold);
      text-shadow: 0 0 20px var(--gold), 0 0 40px var(--gold);
      animation: pulse-glow 0.5s ease-in-out infinite alternate, reveal-pop 0.5s ease-out;
    }

    /* ==================== Fortune Wheel - Tigrinho Style ==================== */
    .gold-title {
      font-family: var(--font-display);
      font-size: clamp(1.2rem, 5vw, 2rem);
      color: var(--gold);
      text-shadow: 0 0 10px var(--gold), 0 0 40px var(--gold), 0 0 80px rgba(255, 215, 0, 0.5);
      margin-bottom: 0.5rem;
    }

    .wheel-badges {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .wheel-badge {
      background: rgba(255, 225, 77, 0.1);
      border: 1px solid rgba(255, 215, 0, 0.3);
      border-radius: 20px;
      padding: 0.2rem 0.8rem;
      font-family: var(--font-body);
      font-size: 0.75rem;
      color: var(--neon-yellow);
    }

    .wheel-container {
      position: relative;
      width: 320px;
      height: 320px;
      margin: 0.5rem auto;
    }

    .wheel-pointer {
      position: absolute;
      top: -20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 2.5rem;
      color: var(--gold);
      filter: drop-shadow(0 0 10px var(--gold));
      z-index: 10;
      line-height: 1;
    }

    #wheel-canvas {
      border-radius: 50%;
      border: 6px solid var(--gold);
      box-shadow: 0 0 40px rgba(255, 215, 0, 0.4), 0 0 80px rgba(255, 215, 0, 0.15), inset 0 0 30px rgba(255, 215, 0, 0.1);
    }

    .wheel-lights {
      position: absolute;
      width: 332px;
      height: 332px;
      top: -6px;
      left: -6px;
      border-radius: 50%;
      pointer-events: none;
      z-index: 5;
    }

    .wheel-light {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 6px var(--gold), 0 0 12px rgba(255, 215, 0, 0.5);
    }

    .wheel-light.on {
      background: #fff;
      box-shadow: 0 0 8px #fff, 0 0 16px var(--gold);
    }

    .gold-btn {
      border-color: var(--gold) !important;
      color: var(--gold) !important;
      box-shadow: 0 0 15px rgba(255, 215, 0, 0.3), inset 0 0 15px rgba(255, 215, 0, 0.1) !important;
    }

    .gold-btn:hover {
      background: rgba(255, 215, 0, 0.15) !important;
      box-shadow: 0 0 30px rgba(255, 215, 0, 0.5), inset 0 0 30px rgba(255, 215, 0, 0.2) !important;
    }

    #wheel-result {
      min-height: 3.5rem;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ==================== Result Screen ==================== */
    .celebration-title {
      font-family: var(--font-display);
      font-size: clamp(1.3rem, 5vw, 2.2rem);
      color: var(--neon-pink);
      margin-bottom: 1.5rem;
      animation: pulse-glow 1.5s ease-in-out infinite alternate;
    }

    .result-cards {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.8rem;
      width: 100%;
      max-width: 400px;
      margin-bottom: 2rem;
    }

    .result-card {
      background: rgba(26, 0, 48, 0.85);
      border-radius: 16px;
      padding: 1.2rem 1.5rem;
      text-align: center;
      width: 90%;
      backdrop-filter: blur(10px);
      animation: card-slide-in 0.6s ease-out both;
    }

    .result-card:nth-child(1) {
      border: 2px solid var(--neon-cyan);
      box-shadow: 0 0 20px rgba(0, 240, 255, 0.2);
      animation-delay: 0.2s;
    }
    .result-card:nth-child(2) {
      border: 2px solid var(--neon-pink);
      box-shadow: 0 0 20px rgba(255, 45, 117, 0.2);
      animation-delay: 0.5s;
    }
    .result-card:nth-child(3) {
      border: 2px solid var(--gold);
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
      animation-delay: 0.8s;
    }

    @keyframes card-slide-in {
      from { transform: translateY(40px) scale(0.9); opacity: 0; }
      to { transform: translateY(0) scale(1); opacity: 1; }
    }

    .result-label {
      font-family: var(--font-body);
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: rgba(240, 240, 240, 0.5);
      margin-bottom: 0.5rem;
    }

    .result-value {
      font-family: var(--font-body);
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--white);
    }

    .result-year {
      font-family: var(--font-body);
      font-size: 0.85rem;
      color: rgba(240, 240, 240, 0.6);
      margin-top: 0.2rem;
    }

    /* Confetti */
    .confetti-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 100;
      overflow: hidden;
    }

    .confetti-piece {
      position: absolute;
      width: 8px;
      height: 8px;
      top: -10px;
      animation: confetti-fall linear forwards;
    }

    @keyframes confetti-fall {
      0% { transform: translateY(-10px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }

    /* ==================== Progress Bar ==================== */
    .progress-bar {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
      align-items: center;
    }

    .progress-step {
      font-size: 1.5rem;
      opacity: 0.3;
      transition: all 0.3s;
      filter: grayscale(1);
    }

    .progress-step.active {
      opacity: 1;
      filter: grayscale(0);
      transform: scale(1.3);
      animation: pulse-step 1s ease-in-out infinite alternate;
    }

    .progress-step.done {
      opacity: 0.7;
      filter: grayscale(0);
    }

    @keyframes pulse-step {
      from { transform: scale(1.3); }
      to { transform: scale(1.5); }
    }

    /* ==================== Mobile Responsiveness ==================== */
    @media (max-width: 400px) {
      .slot-frame {
        padding: 1rem 0.5rem;
      }
      .reel-window {
        width: 85px;
        height: 75px;
      }
      .reel-item {
        width: 85px;
        height: 75px;
        font-size: 0.55rem;
      }
      .wheel-container {
        width: 280px;
        height: 280px;
      }
      #wheel-canvas {
        width: 280px;
        height: 280px;
      }
      .wheel-lights {
        width: 292px;
        height: 292px;
        top: -6px;
        left: -6px;
      }
      .dice-scene {
        width: 110px;
        height: 110px;
      }
      .dice-face {
        width: 110px;
        height: 110px;
        font-size: 2.8rem;
      }
      .front  { transform: translateZ(55px); }
      .back   { transform: rotateY(180deg) translateZ(55px); }
      .right  { transform: rotateY(90deg) translateZ(55px); }
      .left   { transform: rotateY(-90deg) translateZ(55px); }
      .top    { transform: rotateX(90deg) translateZ(55px); }
      .bottom { transform: rotateX(-90deg) translateZ(55px); }
    }

    /* ==================== Button Disabled State ==================== */
    .neon-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }
    .neon-btn:disabled:hover {
      background: transparent;
      transform: none;
      box-shadow: 0 0 15px rgba(0, 240, 255, 0.3), inset 0 0 15px rgba(0, 240, 255, 0.1);
    }

    /* ==================== Landing Footer ==================== */
    .landing-footer {
      font-family: var(--font-body);
      font-size: 0.75rem;
      color: rgba(240, 240, 240, 0.3);
      margin-top: 3rem;
    }
  </style>
</head>
<body>

  <!-- ==================== Landing Section ==================== -->
  <section id="landing" class="active">
    <h1 class="neon-text">MOVIE NIGHT</h1>
    <p>Chega de briga! Deixa a sorte decidir. 🎰</p>
    <div class="preview-icons">
      <div class="preview-icon">
        <span>🎲</span>
        <small>Mood</small>
      </div>
      <div class="preview-icon">
        <span>🎰</span>
        <small>Filme</small>
      </div>
      <div class="preview-icon">
        <span>🐯</span>
        <small>Comida</small>
      </div>
    </div>
    <button id="btn-start" class="neon-btn">COMEÇAR A NOITE</button>
    <p class="landing-footer">Feito com 💕 para casais indecisos</p>
  </section>

  <!-- ==================== Dice Game Section ==================== -->
  <section id="dice-game">
    <div class="progress-bar">
      <div class="progress-step active">🎲</div>
      <div class="progress-step">🎰</div>
      <div class="progress-step">🐯</div>
    </div>
    <h2 class="neon-text-cyan">QUAL O MOOD DA NOITE?</h2>

    <div class="dice-scene">
      <div class="dice-cube" id="dice-cube">
        <div class="dice-face front">💕</div>
        <div class="dice-face back">🔥</div>
        <div class="dice-face right">🥹</div>
        <div class="dice-face left">😂</div>
        <div class="dice-face top">😱</div>
        <div class="dice-face bottom">😭</div>
      </div>
    </div>

    <div id="dice-result"></div>

    <button id="btn-roll" class="neon-btn">JOGAR O DADO 🎲</button>
  </section>

  <!-- ==================== Slot Game Section ==================== -->
  <section id="slot-game">
    <div class="progress-bar">
      <div class="progress-step done">🎲</div>
      <div class="progress-step active">🎰</div>
      <div class="progress-step">🐯</div>
    </div>
    <h2 class="neon-text">QUAL FILME DA NOITE?</h2>

    <div id="mood-badge" class="mood-badge"></div>
    <div id="spin-counter" class="spin-counter"></div>

    <div class="slot-machine">
      <div class="slot-frame">
        <div class="slot-reels">
          <div class="reel-window">
            <div class="reel-strip" id="reel-1"></div>
          </div>
          <div class="reel-window">
            <div class="reel-strip" id="reel-2"></div>
          </div>
          <div class="reel-window">
            <div class="reel-strip" id="reel-3"></div>
          </div>
        </div>
      </div>
    </div>

    <div id="slot-result"></div>

    <button id="btn-spin" class="neon-btn">PUXAR A ALAVANCA 🎰</button>
  </section>

  <!-- ==================== Wheel Game Section ==================== -->
  <section id="wheel-game">
    <div class="progress-bar">
      <div class="progress-step done">🎲</div>
      <div class="progress-step done">🎰</div>
      <div class="progress-step active">🐯</div>
    </div>
    <h2 class="gold-title">O QUE COMER? 🐯</h2>

    <div id="wheel-badges" class="wheel-badges"></div>

    <div class="wheel-container">
      <div class="wheel-lights" id="wheel-lights"></div>
      <div class="wheel-pointer">▼</div>
      <canvas id="wheel-canvas" width="320" height="320"></canvas>
    </div>

    <div id="wheel-result"></div>

    <button id="btn-wheel" class="neon-btn gold-btn">GIRAR A RODA 🐯</button>
  </section>

  <!-- ==================== Result Section ==================== -->
  <section id="result">
    <div class="confetti-container" id="confetti"></div>

    <h2 class="neon-text celebration-title">SUA NOITE ESTÁ PRONTA!</h2>

    <div id="result-cards" class="result-cards"></div>

    <button id="btn-retry" class="neon-btn">NÃO CURTI, GIRAR TUDO DE NOVO! 🔄</button>
  </section>

  <!-- ==================== Game Script ==================== -->
  <script>
    // ==================== Data Arrays ====================
    const MOODS = [
      { emoji: '💕', name: 'Romântico' },
      { emoji: '🔥', name: 'Adrenalina' },
      { emoji: '🥹', name: 'Nostalgia' },
      { emoji: '😂', name: 'Comédia' },
      { emoji: '😱', name: 'Suspense' },
      { emoji: '😭', name: 'Choradeira' }
    ];

    const FOODS = [
      { emoji: '🍕', name: 'Pizza' },
      { emoji: '🍿', name: 'Pipoca' },
      { emoji: '🌭', name: 'Hot Dog' },
      { emoji: '🍔', name: 'Hambúrguer' },
      { emoji: '🍣', name: 'Sushi / Japa' },
      { emoji: '🧁', name: 'Doces & Chocolates' },
      { emoji: '🌮', name: 'Tacos / Mexicano' },
      { emoji: '🍝', name: 'Macarrão' },
      { emoji: '🥤', name: 'Açaí' },
      { emoji: '🍗', name: 'Frango Frito' },
      { emoji: '🧀', name: 'Tábua de Frios' },
      { emoji: '🥪', name: 'Sanduíche' },
      { emoji: '🍩', name: 'Donuts' },
      { emoji: '🫕', name: 'Fondue' },

    // ==================== Utility Functions ====================
    function shuffleArray(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    // ==================== Game State Machine ====================
    const screens = ['landing', 'dice-game', 'slot-game', 'wheel-game', 'result'];
    let currentScreen = 0;
    const gameState = { mood: null, movie: null, food: null };

    function showScreen(id) {
      document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');

      // Update mood badge and init slot game when entering slot screen
      if (id === 'slot-game') {
        if (gameState.mood) {
          document.getElementById('mood-badge').textContent =
            `Mood: ${gameState.mood.emoji} ${gameState.mood.name}`;
        }
        initSlotGame();
      }

      // Set up wheel when entering wheel-game screen
      if (id === 'wheel-game') {
        createWheelLights();
        drawWheel(0);
        if (gameState.mood && gameState.movie) {
          document.getElementById('wheel-badges').innerHTML = `
            <span class="wheel-badge">${gameState.mood.emoji} ${gameState.mood.name}</span>
            <span class="wheel-badge">🎬 ${gameState.movie.title}</span>
          `;
        }
      }
    }

    function nextScreen() {
      currentScreen++;
      if (currentScreen < screens.length) {
        if (screens[currentScreen] === 'result') {
          showResult();
        } else {
          showScreen(screens[currentScreen]);
        }
      }
    }

    function resetGame() {
      currentScreen = 0;
      gameState.mood = null;
      gameState.movie = null;
      gameState.food = null;
      document.getElementById('btn-spin').textContent = 'PUXAR A ALAVANCA 🎰';
      showScreen('landing');
    }

    // ==================== Wire Up Landing Button ====================
    document.getElementById('btn-start').addEventListener('click', () => {
      nextScreen(); // goes to dice-game
    });
    // ==================== Dice Game ====================
    document.getElementById('btn-roll').addEventListener('click', () => {
      const btn = document.getElementById('btn-roll');
      btn.disabled = true;
      btn.style.opacity = '0.5';

      // Clear previous result
      document.getElementById('dice-result').innerHTML = '';

      const randomMood = Math.floor(Math.random() * 6);
      const cube = document.getElementById('dice-cube');

      // Rotation map: which rotation shows which face forward
      const rotations = [
        { x: 0, y: 0 },       // front - 💕 Romântico
        { x: 0, y: 180 },     // back - 🔥 Adrenalina
        { x: 0, y: -90 },     // right - 🥹 Nostalgia
        { x: 0, y: 90 },      // left - 😂 Comédia
        { x: -90, y: 0 },     // top - 😱 Suspense
        { x: 90, y: 0 },      // bottom - 😭 Choradeira
      ];

      // Dramatic spin: exact multiples of 360 + final position
      const extraSpins = (Math.floor(Math.random() * 3) + 2) * 360; // 720, 1080, or 1440
      const targetX = extraSpins + rotations[randomMood].x;
      const targetY = extraSpins + rotations[randomMood].y;

      cube.style.transition = 'transform 2.5s cubic-bezier(0.2, 0.8, 0.3, 1)';
      cube.style.transform = `rotateX(${targetX}deg) rotateY(${targetY}deg)`;

      // After spin completes, show result
      setTimeout(() => {
        gameState.mood = MOODS[randomMood];
        document.getElementById('dice-result').innerHTML =
          `<span class="result-reveal">${MOODS[randomMood].emoji} ${MOODS[randomMood].name}!</span>`;

        // Auto-advance after showing result
        setTimeout(() => {
          btn.disabled = false;
          btn.style.opacity = '1';
          nextScreen();
        }, 2000);
      }, 2700);
    });

    // ==================== Slot Machine (Trinca Mechanic) ====================
    let slotSpinCount = 0;
    let slotMaxSpins = 0;
    let slotWinningMovie = null;
    let slotIsSpinning = false;

    function initSlotGame() {
      slotSpinCount = 0;
      slotMaxSpins = Math.floor(Math.random() * 6) + 2; // 2 to 7 spins
      slotWinningMovie = MOVIES[Math.floor(Math.random() * MOVIES.length)];
      slotIsSpinning = false;
      document.getElementById('slot-result').innerHTML = '';
      document.getElementById('spin-counter').textContent = '';
    }

    function updateSpinCounter() {
      document.getElementById('spin-counter').textContent =
        `Tentativa ${slotSpinCount} de ${slotMaxSpins}`;
    }

    function populateReelWithTarget(reelId, targetMovie) {
      const strip = document.getElementById(reelId);
      strip.innerHTML = '';
      strip.style.transition = 'none';
      strip.style.transform = 'translateY(0)';

      // Build reel: random movies, then the target at the landing position
      const shuffled = shuffleArray(MOVIES).slice(0, 15);
      const landingIndex = shuffled.length; // target goes at the end
      shuffled.push(targetMovie);

      shuffled.forEach(movie => {
        const item = document.createElement('div');
        item.className = 'reel-item';
        item.textContent = `🎬 ${movie.title} (${movie.year})`;
        strip.appendChild(item);
      });

      return landingIndex;
    }

    function spinReels(movies) {
      // movies = [movie1, movie2, movie3] — what each reel should land on
      const itemHeight = 90;

      for (let i = 0; i < 3; i++) {
        const reelId = `reel-${i + 1}`;
        const landingIndex = populateReelWithTarget(reelId, movies[i]);

        const strip = document.getElementById(reelId);
        void strip.offsetHeight; // force reflow

        const offset = -(landingIndex * itemHeight);

        setTimeout(() => {
          strip.style.transition = `transform ${1.5 + i * 0.5}s cubic-bezier(0.1, 0.7, 0.3, 1)`;
          strip.style.transform = `translateY(${offset}px)`;
        }, i * 300);
      }
    }

    function getRandomMovieExcluding(exclude) {
      let movie;
      do {
        movie = MOVIES[Math.floor(Math.random() * MOVIES.length)];
      } while (movie.title === exclude.title);
      return movie;
    }

    document.getElementById('btn-spin').addEventListener('click', () => {
      if (slotIsSpinning) return;

      const btn = document.getElementById('btn-spin');
      slotIsSpinning = true;
      btn.disabled = true;
      btn.style.opacity = '0.5';

      document.getElementById('slot-result').innerHTML = '';
      slotSpinCount++;
      updateSpinCounter();

      const isLastSpin = slotSpinCount >= slotMaxSpins;
      let reelMovies;

      if (isLastSpin) {
        // JACKPOT! All 3 reels show the same movie
        reelMovies = [slotWinningMovie, slotWinningMovie, slotWinningMovie];
      } else {
        // Not yet — show 3 different movies (no match)
        const m1 = MOVIES[Math.floor(Math.random() * MOVIES.length)];
        const m2 = getRandomMovieExcluding(m1);
        const m3 = getRandomMovieExcluding(m2);
        reelMovies = [m1, m2, m3];
      }

      spinReels(reelMovies);

      // Wait for all reels to stop
      const waitTime = 300 * 3 + (1.5 + 2 * 0.5) * 1000 + 500;
      setTimeout(() => {
        slotIsSpinning = false;

        if (isLastSpin) {
          // JACKPOT!
          gameState.movie = slotWinningMovie;
          document.getElementById('slot-result').innerHTML =
            `<div class="jackpot-text">🎰 JACKPOT! 🎰</div>
             <span class="result-reveal">🎬 ${slotWinningMovie.title} (${slotWinningMovie.year})</span>`;

          btn.textContent = 'PUXAR A ALAVANCA 🎰';
          setTimeout(() => {
            btn.disabled = false;
            btn.style.opacity = '1';
            nextScreen();
          }, 3000);
        } else {
          // Not a match — let them spin again
          btn.disabled = false;
          btn.style.opacity = '1';
          btn.textContent = `PUXAR DE NOVO! (${slotSpinCount}/${slotMaxSpins}) 🎰`;
        }
      }, waitTime);
    });

    // ==================== Fortune Wheel (Tigrinho Style) ====================

    // Generate lights around the wheel
    function createWheelLights() {
      const container = document.getElementById('wheel-lights');
      container.innerHTML = '';
      const numLights = 24;
      const containerSize = 332;
      const center = containerSize / 2;
      const radius = center; // lights sit on the outer edge of the gold border
      for (let i = 0; i < numLights; i++) {
        const angle = (i / numLights) * 2 * Math.PI - Math.PI / 2;
        const light = document.createElement('div');
        light.className = 'wheel-light';
        light.style.left = (center + radius * Math.cos(angle) - 4) + 'px';
        light.style.top = (center + radius * Math.sin(angle) - 4) + 'px';
        container.appendChild(light);
      }
    }

    // Blinking lights animation
    let lightInterval = null;
    function startLightAnimation() {
      const lights = document.querySelectorAll('.wheel-light');
      let toggle = false;
      lightInterval = setInterval(() => {
        lights.forEach((light, i) => {
          light.classList.toggle('on', (i % 2 === 0) === toggle);
        });
        toggle = !toggle;
      }, 300);
    }

    function stopLightAnimation() {
      if (lightInterval) {
        clearInterval(lightInterval);
        lightInterval = null;
      }
    }

    // Draw the wheel using Canvas
    const WHEEL_COLORS = [
      '#e74c3c', '#f39c12', '#2ecc71', '#e67e22',
      '#ff2d75', '#00bcd4', '#9b59b6', '#27ae60',
      '#c0392b', '#f1c40f', '#1abc9c', '#d35400',
      '#e91e63', '#00f0ff', '#8e44ad', '#2ecc71'
    ];

    function drawWheel(rotationDeg) {
      const canvas = document.getElementById('wheel-canvas');
      const ctx = canvas.getContext('2d');
      const cx = canvas.width / 2;
      const cy = canvas.height / 2;
      const r = 154; // radius leaving space for border
      const segAngle = (2 * Math.PI) / FOODS.length;

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate((rotationDeg * Math.PI) / 180);

      FOODS.forEach((food, i) => {
        const startAngle = i * segAngle - Math.PI / 2;
        const endAngle = startAngle + segAngle;

        // Draw segment
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.arc(0, 0, r, startAngle, endAngle);
        ctx.closePath();
        ctx.fillStyle = WHEEL_COLORS[i];
        ctx.fill();
        ctx.strokeStyle = '#ffd700';
        ctx.lineWidth = 1.5;
        ctx.stroke();

        // Draw text
        ctx.save();
        ctx.rotate(startAngle + segAngle / 2 + Math.PI / 2);
        ctx.textAlign = 'center';
        ctx.fillStyle = '#fff';
        ctx.shadowColor = 'rgba(0,0,0,0.8)';
        ctx.shadowBlur = 4;
        // Draw emoji
        ctx.font = '14px sans-serif';
        ctx.fillText(food.emoji, 0, -r + 22);
        // Draw name (truncate if too long)
        ctx.font = 'bold 7px Outfit, sans-serif';
        const name = food.name.length > 12 ? food.name.substring(0, 11) + '…' : food.name;
        ctx.fillText(name, 0, -r + 35);
        ctx.restore();
      });

      ctx.restore();

      // Draw center circle (golden hub)
      ctx.beginPath();
      ctx.arc(cx, cy, 22, 0, 2 * Math.PI);
      const gradient = ctx.createRadialGradient(cx, cy, 5, cx, cy, 22);
      gradient.addColorStop(0, '#fff');
      gradient.addColorStop(0.5, '#ffd700');
      gradient.addColorStop(1, '#b8860b');
      ctx.fillStyle = gradient;
      ctx.fill();
      ctx.strokeStyle = '#8B6914';
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    // Spin the wheel
    let isWheelSpinning = false;

    document.getElementById('btn-wheel').addEventListener('click', () => {
      if (isWheelSpinning) return;
      isWheelSpinning = true;
      document.getElementById('btn-wheel').disabled = true;
      document.getElementById('btn-wheel').style.opacity = '0.5';
      document.getElementById('wheel-result').innerHTML = '';

      const selectedIndex = Math.floor(Math.random() * FOODS.length);
      const segAngle = 360 / FOODS.length;

      // Target: pointer is at top (0 degrees). We need the selected segment's center at the top.
      // Segments start from -90deg (top). Segment i center is at i * segAngle.
      // So we need to rotate so that segment i is at the top: -(i * segAngle + segAngle/2)
      const targetSegCenter = selectedIndex * segAngle + segAngle / 2;
      const baseAngle = 360 - targetSegCenter; // this puts the segment at top
      const totalAngle = 360 * 8 + baseAngle; // 8 full spins + final position

      const duration = 6000;
      const startTime = performance.now();
      let startAngle = 0; // could track previous angle for continuity

      function animateSpin(now) {
        const elapsed = now - startTime;
        const progress = Math.min(elapsed / duration, 1);
        // Ease out quart for dramatic deceleration
        const eased = 1 - Math.pow(1 - progress, 4);
        const currentAngle = eased * totalAngle;

        drawWheel(currentAngle);

        if (progress < 1) {
          requestAnimationFrame(animateSpin);
        } else {
          // Spin complete
          isWheelSpinning = false;
          gameState.food = FOODS[selectedIndex];

          document.getElementById('wheel-result').innerHTML =
            `<span class="result-reveal">${FOODS[selectedIndex].emoji} ${FOODS[selectedIndex].name}!</span>`;

          setTimeout(() => {
            stopLightAnimation();
            document.getElementById('btn-wheel').disabled = false;
            document.getElementById('btn-wheel').style.opacity = '1';
            nextScreen();
          }, 2500);
        }
      }

      startLightAnimation();
      requestAnimationFrame(animateSpin);
    });

    // ==================== Result Screen ====================
    function showResult() {
      showScreen('result');

      const container = document.getElementById('result-cards');
      container.innerHTML = `
        <div class="result-card">
          <div class="result-label">MOOD DA NOITE</div>
          <div class="result-value">${gameState.mood.emoji} ${gameState.mood.name}</div>
        </div>
        <div class="result-card">
          <div class="result-label">FILME</div>
          <div class="result-value">🎬 ${gameState.movie.title}</div>
          <div class="result-year">(${gameState.movie.year})</div>
        </div>
        <div class="result-card">
          <div class="result-label">COMIDA</div>
          <div class="result-value">${gameState.food.emoji} ${gameState.food.name}</div>
        </div>
      `;

      // Launch confetti
      createConfetti();
    }

    function createConfetti() {
      const container = document.getElementById('confetti');
      container.innerHTML = '';
      const colors = ['#ff2d75', '#00f0ff', '#ffe14d', '#ffd700', '#2ecc71', '#9b59b6'];

      for (let i = 0; i < 50; i++) {
        const piece = document.createElement('div');
        piece.className = 'confetti-piece';
        piece.style.left = Math.random() * 100 + '%';
        piece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        piece.style.animationDuration = (2 + Math.random() * 3) + 's';
        piece.style.animationDelay = Math.random() * 2 + 's';
        // Random shapes: square or rectangle
        piece.style.width = (5 + Math.random() * 8) + 'px';
        piece.style.height = (5 + Math.random() * 8) + 'px';
        piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
        container.appendChild(piece);
      }

      // Clean up confetti after animations complete
      setTimeout(() => { container.innerHTML = ''; }, 6000);
    }

    // ==================== Wire Retry Button ====================
    document.getElementById('btn-retry').addEventListener('click', resetGame);
  </script>
