  <style>
    /* ==================== CSS Custom Properties ==================== */
    :root {
      --bg-dark: #0a0015;
      --bg-purple: #1a0030;
      --bg-blue: #0d1b2a;
      --neon-pink: #ff2d75;
      --neon-cyan: #00f0ff;
      --neon-yellow: #ffe14d;
      --gold: #ffd700;
      --gold-dark: #b8860b;
      --white: #f0f0f0;
      --font-display: 'Bungee Shade', cursive;
      --font-body: 'Outfit', sans-serif;
    }

    /* ==================== CSS Reset ==================== */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* ==================== Body ==================== */
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, var(--bg-dark), var(--bg-purple), var(--bg-blue));
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite;
      font-family: var(--font-body);
      color: var(--white);
      overflow-x: hidden;
    }

    @keyframes gradientShift {
      0% {
        background-position: 0% 50%;
      }
      25% {
        background-position: 100% 0%;
      }
      50% {
        background-position: 100% 50%;
      }
      75% {
        background-position: 0% 100%;
      }
      100% {
        background-position: 0% 50%;
      }
    }

    /* ==================== Sections ==================== */
    section {
      min-height: 100vh;
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 2rem;
    }

    section.active {
      display: flex;
    }

    /* ==================== Neon Text Utilities ==================== */
    .neon-text {
      text-shadow:
        0 0 10px var(--neon-pink),
        0 0 40px var(--neon-pink),
        0 0 80px var(--neon-pink);
    }

    .neon-text-cyan {
      text-shadow:
        0 0 10px var(--neon-cyan),
        0 0 40px var(--neon-cyan),
        0 0 80px var(--neon-cyan);
    }

    /* ==================== Landing Screen ==================== */
    #landing h1 {
      font-family: var(--font-display);
      font-size: clamp(2rem, 8vw, 4.5rem);
      color: var(--neon-pink);
      text-align: center;
      animation: pulse-glow 2s ease-in-out infinite alternate;
    }

    @keyframes pulse-glow {
      from { text-shadow: 0 0 10px var(--neon-pink), 0 0 40px var(--neon-pink); }
      to { text-shadow: 0 0 20px var(--neon-pink), 0 0 60px var(--neon-pink), 0 0 100px var(--neon-pink); }
    }

    #landing p {
      font-family: var(--font-body);
      color: var(--white);
      font-size: 1.1rem;
      opacity: 0.8;
      margin: 1rem 0 2rem;
    }

    .preview-icons {
      display: flex;
      gap: 2.5rem;
      margin-bottom: 2.5rem;
    }

    .preview-icon {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }

    .preview-icon span {
      font-size: 2.5rem;
      filter: drop-shadow(0 0 8px var(--neon-cyan));
    }

    .preview-icon small {
      font-family: var(--font-body);
      font-size: 0.9rem;
      color: var(--neon-cyan);
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: 0.8;
    }

    .neon-btn {
      font-family: var(--font-body);
      font-size: 1.3rem;
      font-weight: 700;
      padding: 1rem 2.5rem;
      border: 2px solid var(--neon-cyan);
      background: transparent;
      color: var(--neon-cyan);
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 2px;
      transition: all 0.3s;
      box-shadow: 0 0 15px rgba(0, 240, 255, 0.3), inset 0 0 15px rgba(0, 240, 255, 0.1);
      border-radius: 8px;
    }
    .neon-btn:hover {
      background: rgba(0, 240, 255, 0.15);
      box-shadow: 0 0 30px rgba(0, 240, 255, 0.5), inset 0 0 30px rgba(0, 240, 255, 0.2);
      transform: scale(1.05);
    }
    .neon-btn:active {
      transform: scale(0.95);
    }
  </style>
</head>

    // ==================== Utility Functions ====================
    function shuffleArray(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    // ==================== Game State Machine ====================
    const screens = ['landing', 'dice-game', 'slot-game', 'wheel-game', 'result'];
    let currentScreen = 0;
    const gameState = { mood: null, movie: null, food: null };

    function showScreen(id) {
      document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    function nextScreen() {
      currentScreen++;
      if (currentScreen < screens.length) {
        showScreen(screens[currentScreen]);
      }
    }

    function resetGame() {
      currentScreen = 0;
      gameState.mood = null;
      gameState.movie = null;
      gameState.food = null;
      showScreen('landing');
    }

    // ==================== Wire Up Landing Button ====================
    document.getElementById('btn-start').addEventListener('click', () => {

    });
